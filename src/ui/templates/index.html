<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Composer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --neon: #00ff41;
    --neon-dim: #00cc35;
    --cyan: #00ffff;
    --pink: #ff6ec7;
    --white-key-w: 52px;
    --black-key-w: 36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #c9d1d9;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
  }

  /* scanline */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    pointer-events: none; z-index: 100;
  }

  .pixel-font {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; letter-spacing: 1px;
  }

  .neon-text {
    color: var(--neon);
    text-shadow: 0 0 7px var(--neon), 0 0 20px var(--neon-dim);
  }

  /* ─── piano ─── */
  .piano-wrap {
    position: relative;
    margin: 8px auto 0;
    height: 190px;
  }

  .white-keys {
    display: flex;
    position: relative;
    z-index: 1;
    height: 100%;
  }

  .white-key {
    width: var(--white-key-w);
    height: 100%;
    flex-shrink: 0;
    background: linear-gradient(180deg, #f0f0f0 0%, #d4d4d4 100%);
    border: 2px solid #888;
    border-radius: 0 0 6px 6px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 10px;
    cursor: pointer;
    transition: background 0.05s, transform 0.05s;
  }

  .white-key:hover { background: linear-gradient(180deg, #e8e8e8 0%, #c8c8c8 100%); }

  .white-key.active {
    background: linear-gradient(180deg, #00ff41 0%, #00b834 100%) !important;
    box-shadow: 0 0 15px var(--neon), inset 0 0 10px rgba(0,255,65,0.3);
    transform: scaleY(0.97);
  }

  .white-key .key-label { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #333; margin-bottom: 2px; }
  .white-key .note-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #666; }
  .white-key.active .key-label,
  .white-key.active .note-label { color: #004d1a; }

  .black-key {
    position: absolute;
    top: 0;
    width: var(--black-key-w);
    height: 115px;
    z-index: 2;
    background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
    border: 2px solid #555;
    border-radius: 0 0 5px 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 8px;
    transition: background 0.05s, transform 0.05s;
  }

  .black-key:hover { background: linear-gradient(180deg, #3a3a4e 0%, #2a2a3e 100%); }

  .black-key.active {
    background: linear-gradient(180deg, #00cc35 0%, #008a22 100%) !important;
    box-shadow: 0 0 15px var(--neon-dim), inset 0 0 8px rgba(0,255,65,0.3);
    transform: scaleY(0.97);
  }

  .black-key .key-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #aaa; margin-bottom: 2px; }
  .black-key .note-label { font-family: 'Press Start 2P', monospace; font-size: 6px; color: #777; }
  .black-key.active .key-label,
  .black-key.active .note-label { color: #003d0f; }

  /* ─── controls ─── */
  .wave-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 2px;
    max-width: 650px;
    margin: 0 auto;
  }

  .wave-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: #8b949e;
    padding: 4px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    transition: all 0.1s;
    text-align: center;
    white-space: nowrap;
  }

  .wave-btn:hover { border-color: var(--neon-dim); color: var(--neon); }

  .wave-btn.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 8px rgba(0,255,65,0.3), inset 0 0 6px rgba(0,255,65,0.1);
  }

  .control-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: #8b949e;
    padding: 4px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .control-btn:hover { border-color: var(--neon-dim); color: var(--neon); }
  .control-btn.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 8px rgba(0,255,65,0.2);
  }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 120px; height: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: var(--neon);
    cursor: pointer;
    border: 1px solid var(--neon-dim);
  }

  #active-note {
    min-height: 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--neon);
    text-shadow: 0 0 7px var(--neon);
  }

  @keyframes flicker {
    0%{opacity:.97} 5%{opacity:.99} 10%{opacity:.95} 15%{opacity:.98}
    20%{opacity:.97} 50%{opacity:.99} 80%{opacity:.98} 90%{opacity:.96}
    100%{opacity:.97}
  }
  body { animation: flicker 3s infinite; }
</style>
</head>
<body class="flex flex-col items-center">

  <!-- Header -->
  <header class="w-full flex justify-center pt-3 pb-1">
    <h1 class="pixel-font neon-text text-base tracking-widest">
      ▸ 8-BIT COMPOSER ◂
    </h1>
  </header>

  <!-- Wave type selector -->
  <div id="wave-grid" class="wave-grid mt-2 px-4"></div>

  <!-- Piano -->
  <div id="piano-wrap" class="piano-wrap" style="width:fit-content"></div>

  <!-- Controls row -->
  <div class="flex items-center gap-4 mt-2 flex-wrap justify-center px-4">

    <!-- Arpeggio -->
    <div class="flex items-center gap-1">
      <span class="pixel-font text-[7px] text-gray-500">ARP</span>
      <button class="control-btn active" data-arp="off">OFF</button>
      <button class="control-btn" data-arp="maj">MAJ</button>
      <button class="control-btn" data-arp="min">MIN</button>
      <button class="control-btn" data-arp="sus4">SUS4</button>
      <button class="control-btn" data-arp="oct">OCT</button>
      <input type="range" id="arp-rate" min="2" max="20" value="8" step="1" title="ARP speed">
    </div>

    <!-- Vibrato -->
    <div class="flex items-center gap-1">
      <span class="pixel-font text-[7px] text-gray-500">VIB</span>
      <input type="range" id="vib-depth" min="0" max="200" value="0" step="5" title="VIB depth">
      <span class="pixel-font text-[7px] text-gray-500" style="min-width:24px" id="vib-val">0</span>
    </div>

    <!-- Mode toggle -->
    <div class="flex items-center gap-1">
      <button class="control-btn active" id="btn-8bit" data-mode="8bit">8-BIT</button>
      <button class="control-btn" id="btn-sf2" data-mode="sf2">PIANO</button>
    </div>

    <!-- Volume -->
    <div class="flex items-center gap-1">
      <span class="pixel-font text-[7px] text-gray-500">VOL</span>
      <input type="range" id="volume" min="0" max="100" value="70" step="1">
      <span class="pixel-font text-[7px] text-gray-500" id="vol-display">70</span>
    </div>
  </div>

  <!-- Active note -->
  <div id="active-note" class="mt-2 text-center">&nbsp;</div>

  <!-- Footer -->
  <footer class="mt-auto pb-2">
    <p class="pixel-font text-[7px] text-gray-600">
      PRESS KEYS OR CLICK TO PLAY &bull; 8-BIT SYNTH &bull; NES/GB/C64
    </p>
  </footer>

<script>
// ─── state ───
let activeKeys = {};
let activeMidi = {};
let currentWave = 'pulse_50';
let currentArp = 'off';
let pianoOrder = [];
let keymapData = {};
let waveLabels = {};
let waveTypes = [];

// ─── init ───
async function init() {
  try {
    [keymapData, waveTypes, waveLabelsObj, pianoOrder] = await Promise.all([
      window.pywebview.api.get_keymap(),
      window.pywebview.api.get_wave_types(),
      window.pywebview.api.get_wave_labels(),
      window.pywebview.api.get_piano_order(),
    ]);
    waveLabels = waveLabelsObj;
  } catch(e) {
    console.error('Init error:', e);
    // Fallback: hardcoded minimal set
    waveTypes = ['pulse_12','pulse_25','pulse_50','pulse_75','triangle','sawtooth','noise_short','noise_long','noise_periodic','sine','wavetable'];
    waveLabels = {};
    for (const w of waveTypes) waveLabels[w] = w.toUpperCase().replace('_',' ');
    pianoOrder = [];
  }

  buildWaveButtons();
  buildPiano(pianoOrder);
  bindEvents();
}

// ─── wave buttons ───
function buildWaveButtons() {
  const grid = document.getElementById('wave-grid');
  for (const wt of waveTypes) {
    const btn = document.createElement('button');
    btn.className = 'wave-btn' + (wt === currentWave ? ' active' : '');
    btn.dataset.wave = wt;
    btn.textContent = waveLabels[wt] || wt;
    grid.appendChild(btn);
  }
}

// ─── piano ───
function buildPiano(order) {
  const wrap = document.getElementById('piano-wrap');
  const whiteKeysDiv = document.createElement('div');
  whiteKeysDiv.className = 'white-keys';
  wrap.innerHTML = '';
  wrap.appendChild(whiteKeysDiv);

  if (!order || order.length === 0) {
    // Minimal fallback piano
    const fallback = [
      {type:'white',key:'a',note:'C4'},{type:'black',key:'w',note:'C#4'},
      {type:'white',key:'s',note:'D4'},{type:'black',key:'e',note:'D#4'},
      {type:'white',key:'d',note:'E4'},{type:'white',key:'f',note:'F4'},
      {type:'black',key:'t',note:'F#4'},{type:'white',key:'g',note:'G4'},
      {type:'black',key:'y',note:'G#4'},{type:'white',key:'h',note:'A4'},
      {type:'black',key:'u',note:'A#4'},{type:'white',key:'j',note:'B4'},
      {type:'white',key:'k',note:'C5'},{type:'black',key:'o',note:'C#5'},
      {type:'white',key:'l',note:'D5'},{type:'black',key:'p',note:'D#5'},
      {type:'white',key:';',note:'E5'},{type:'white',key:"'",note:'F5'},
    ];
    order = fallback;
  }

  const whiteKeyW = 52;
  const blackKeyW = 36;
  let whiteIdx = 0;

  for (const entry of order) {
    if (entry.type === 'white') {
      const keyEl = document.createElement('div');
      keyEl.className = 'white-key';
      keyEl.dataset.key = entry.key;
      keyEl.innerHTML = `<span class="key-label">${entry.key.toUpperCase()}</span><span class="note-label">${entry.note}</span>`;
      whiteKeysDiv.appendChild(keyEl);
      whiteIdx++;
    } else {
      // Black key: position centered on the gap after the last white key
      const keyEl = document.createElement('div');
      keyEl.className = 'black-key';
      keyEl.dataset.key = entry.key;
      keyEl.style.left = (whiteIdx * whiteKeyW - blackKeyW / 2) + 'px';
      keyEl.innerHTML = `<span class="key-label">${entry.key.toUpperCase()}</span><span class="note-label">${entry.note}</span>`;
      wrap.appendChild(keyEl);
    }
  }

  // Set container width to match whites
  const totalW = (order.filter(e => e.type === 'white').length) * whiteKeyW;
  whiteKeysDiv.style.width = totalW + 'px';
  wrap.style.width = totalW + 'px';
}

// ─── API calls ───
async function pressKey(key) {
  if (activeKeys[key]) return;
  activeKeys[key] = true;
  try {
    const r = await window.pywebview.api.note_on(key);
    if (r) {
      activeMidi[r.midi] = true;
      setKeyHighlight(r.key, true);
      updateActiveNote();
    }
  } catch(e) { console.error(e); }
}

async function releaseKey(key) {
  if (!activeKeys[key]) return;
  delete activeKeys[key];
  try {
    const r = await window.pywebview.api.note_off(key);
    if (r) {
      delete activeMidi[r.midi];
      setKeyHighlight(r.key, false);
      updateActiveNote();
    }
  } catch(e) { console.error(e); }
}

async function selectWave(wave) {
  currentWave = wave;
  try { await window.pywebview.api.set_wave_type(wave); } catch(e) {}
  document.querySelectorAll('.wave-btn').forEach(b => b.classList.toggle('active', b.dataset.wave === wave));
}

async function selectArp(type) {
  currentArp = type;
  try { await window.pywebview.api.set_arpeggio(type); } catch(e) {}
  document.querySelectorAll('[data-arp]').forEach(b => b.classList.toggle('active', b.dataset.arp === type));
}

async function setArpRate(val) {
  try { await window.pywebview.api.set_arpeggio_rate(Number(val)); } catch(e) {}
}

async function setVibrato(depth, rate) {
  try { await window.pywebview.api.set_vibrato(Number(depth), Number(rate)); } catch(e) {}
}

async function setVolume(val) {
  try { await window.pywebview.api.set_volume(val / 100); } catch(e) {}
  document.getElementById('vol-display').textContent = val;
}

// ─── UI helpers ───
function setKeyHighlight(key, on) {
  const el = document.querySelector(`[data-key="${key}"]`);
  if (el) el.classList.toggle('active', on);
}

function updateActiveNote() {
  const notes = [];
  for (const entry of pianoOrder) {
    if (entry.midi && activeMidi[entry.midi]) notes.push(entry.note);
  }
  document.getElementById('active-note').textContent = notes.length ? notes.join(' + ') : '\u00A0';
}

// ─── events ───
function bindEvents() {
  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (pianoOrder.some(x => x.key === k)) { e.preventDefault(); pressKey(k); }
  });
  document.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (pianoOrder.some(x => x.key === k)) { e.preventDefault(); releaseKey(k); }
  });

  // Mouse on piano
  const wrap = document.getElementById('piano-wrap');
  wrap.addEventListener('mousedown', e => {
    const el = e.target.closest('[data-key]');
    if (el) pressKey(el.dataset.key);
  });
  wrap.addEventListener('mouseup', e => {
    const el = e.target.closest('[data-key]');
    if (el) releaseKey(el.dataset.key);
  });
  wrap.addEventListener('mouseleave', () => {
    for (const k of Object.keys(activeKeys)) releaseKey(k);
  });

  // Wave grid
  document.getElementById('wave-grid').addEventListener('click', e => {
    const btn = e.target.closest('.wave-btn');
    if (btn) selectWave(btn.dataset.wave);
  });

  // Arpeggio buttons
  document.querySelector('[data-arp="off"]').parentElement.addEventListener('click', e => {
    const btn = e.target.closest('[data-arp]');
    if (btn) selectArp(btn.dataset.arp);
  });

  // Arp rate
  document.getElementById('arp-rate').addEventListener('input', e => setArpRate(e.target.value));

  // Vibrato depth
  const vibDepth = document.getElementById('vib-depth');
  vibDepth.addEventListener('input', () => {
    const d = vibDepth.value / 100;
    document.getElementById('vib-val').textContent = vibDepth.value > 0 ? (d).toFixed(1) : '0';
    setVibrato(d, 5.5);
  });

  // Volume
  const vol = document.getElementById('volume');
  vol.addEventListener('input', () => setVolume(vol.value));

  // Mode toggle
  async function switchMode(mode) {
    try { await window.pywebview.api.set_mode(mode); } catch(e) {}
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    // Hide 8-bit controls when in SF2 mode
    document.getElementById('wave-grid').style.display = mode === 'sf2' ? 'none' : '';
    document.querySelector('[data-arp]').parentElement.style.display = mode === 'sf2' ? 'none' : '';
    document.getElementById('vib-depth').parentElement.style.display = mode === 'sf2' ? 'none' : '';
  }
  document.getElementById('btn-8bit').addEventListener('click', () => switchMode('8bit'));
  document.getElementById('btn-sf2').addEventListener('click', () => switchMode('sf2'));
}

init();
</script>
</body>
</html>
